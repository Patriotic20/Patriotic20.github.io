        document.getElementById("food-title").innerText = foodData[id].title;

        document.getElementById("food-title").innerText = "Xatolik!";
        document.getElementById("food-desc").innerText = "Ma'lumot topilmadi.";
      }
    </script>
    <script>
      function createFlower() {
        const flower = document.createElement("div");
        flower.innerHTML = "🌸"; // Gul yoki 🍃 barg
        flower.style.position = "fixed";
        flower.style.top = "-20px";
        flower.style.left = Math.random() * 100 + "vw";
        flower.style.fontSize = Math.random() * 20 + 10 + "px";
        flower.style.opacity = Math.random();
        flower.style.pointerEvents = "none";
        flower.style.zIndex = "0";
        flower.style.transition = "transform 5s linear, opacity 5s linear";

        document.body.appendChild(flower);

        setTimeout(() => {
          flower.style.transform = `translateY(110vh) rotate(${Math.random() * 360}deg)`;
          flower.style.opacity = "0";
        }, 100);

        setTimeout(() => {
          flower.remove();
        }, 6000);
      }

      // Har 500 millisoniyada bitta gul yaratish
      setInterval(createFlower, 500);
    </script>
